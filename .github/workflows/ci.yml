name: CI

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Person Detection with Camera Streaming

    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: Build
        run: |
          make download
          curl -Ls -f https://github.com/foss-for-synopsys-dwc-arc-processors/toolchain/releases/download/arc-2021.09-release/arc_gnu_2021.09_prebuilt_elf32_le_linux_install.tar.gz -o arc_gnu.tar.gz
          tar xf arc_gnu.tar.gz
          export PATH=/home/runner/work/himax_tflm/himax_tflm/arc_gnu_2021.09_prebuilt_elf32_le_linux_install/bin:$PATH
          make person_detection_int8
          make flash example=person_detection_int8

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: person_detection_camera
          path: "*.img"
          if-no-files-found: error
